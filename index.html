<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0e141c;
    --bg-elevated: #141d28;
    --card-bg: #1a2431;
    --card-bg-hover: #202c3b;
    --brass: #c9a35a;
    --brass-light: #e6cb8f;
    --brass-dim: rgba(201,163,90,0.28);
    --text: #eae6da;
    --text-muted: #8b93a3;
    --success: #7fae7c;
    --success-bg: rgba(127,174,124,0.12);
    --error: #c1725a;
    --error-bg: rgba(193,114,90,0.12);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 20% -10%, rgba(201,163,90,0.07), transparent 60%),
      radial-gradient(ellipse 700px 600px at 100% 100%, rgba(201,163,90,0.05), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:'Spectral', serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:32px 16px 64px;
  }
  .app{width:100%;max-width:640px;}

  /* ---- Header ---- */
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.28em;
    text-transform:uppercase;
    color:var(--brass);
    text-align:center;
    margin-bottom:10px;
  }
  h1{
    font-size:clamp(30px, 6vw, 42px);
    font-weight:600;
    text-align:center;
    margin:0 0 8px;
    letter-spacing:0.01em;
  }
  h1 em{ font-style:italic; color:var(--brass-light); }
  .subtitle{
    text-align:center;
    color:var(--text-muted);
    font-size:15px;
    max-width:460px;
    margin:0 auto 36px;
    line-height:1.5;
  }
  .subtitle strong{ color:var(--text); font-weight:600; }

  /* ---- Status / controls row ---- */
  .toolbar{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px;
    margin-bottom:18px;
  }
  .status{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--text-muted);
    letter-spacing:0.02em;
  }
  button{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.06em;
    text-transform:uppercase;
    cursor:pointer;
    border-radius:3px;
    padding:10px 16px;
    border:1px solid var(--brass-dim);
    background:transparent;
    color:var(--brass-light);
    transition:background 0.15s, border-color 0.15s, color 0.15s, opacity 0.15s;
  }
  button:hover:not(:disabled){ background:rgba(201,163,90,0.1); border-color:var(--brass); }
  button:disabled{ opacity:0.35; cursor:default; }
  .btn-primary{
    background:var(--brass);
    color:#181008;
    border-color:var(--brass);
    font-weight:700;
  }
  .btn-primary:hover:not(:disabled){ background:var(--brass-light); border-color:var(--brass-light); }

  /* ---- Timeline board ---- */
  .board-wrap{
    display:flex;
    gap:14px;
    margin-bottom:8px;
  }
  .rail{
    position:relative;
    width:34px;
    flex:none;
  }
  .rail-line{
    position:absolute;
    left:16px;
    top:8px;
    bottom:8px;
    width:2px;
    background:linear-gradient(var(--brass-dim), var(--brass-dim));
  }
  .tick{
    position:absolute;
    left:0;
    width:34px;
    height:0;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .tick::before{
    content:'';
    position:absolute;
    left:9px;
    width:16px;
    height:2px;
    background:var(--brass);
    border-radius:2px;
    opacity:0.55;
  }
  .tick .year-label{
    position:absolute;
    left:34px;
    white-space:nowrap;
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    color:var(--brass-light);
    opacity:0;
    transform:translateX(-4px);
    transition:opacity 0.4s ease, transform 0.4s ease;
  }
  .tick.revealed .year-label{ opacity:1; transform:translateX(0); }
  .tick.revealed::before{ opacity:1; background:var(--brass-light); }

  #board{
    position:relative;
    flex:1;
    min-height:40px;
  }

  .card{
    position:absolute;
    left:0;
    right:0;
    top:0;
    background:var(--card-bg);
    border:1px solid rgba(255,255,255,0.06);
    border-radius:6px;
    height:96px;
    display:flex;
    align-items:stretch;
    gap:12px;
    padding:10px 14px 10px 8px;
    cursor:grab;
    user-select:none;
    touch-action:none;
    transition:transform 200ms ease, background 0.15s, border-color 0.2s, box-shadow 0.2s;
  }
  .card:hover{ background:var(--card-bg-hover); }
  .card.dragging{
    cursor:grabbing;
    z-index:20;
    box-shadow:0 12px 28px rgba(0,0,0,0.45);
    border-color:var(--brass);
    opacity:0.98;
    transition:background 0.15s, border-color 0.2s, box-shadow 0.2s;
  }
  .card.correct{ border-color:var(--success); background:var(--success-bg); }
  .card.wrong{ border-color:var(--error); background:var(--error-bg); }

  .handle{
    flex:none;
    width:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:var(--text-muted);
    font-size:16px;
    letter-spacing:2px;
    line-height:1;
  }
  .thumb{
    flex:none;
    width:76px;
    height:76px;
    border-radius:4px;
    background:var(--bg-elevated);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:30px;
    margin:auto 0;
  }
  .thumb img{ width:100%; height:100%; object-fit:cover; display:block; }

  .card-body{
    flex:1;
    min-width:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:3px;
  }
  .card-title{
    font-size:16px;
    font-weight:600;
    color:var(--text);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .card-extract{
    font-size:12.5px;
    color:var(--text-muted);
    line-height:1.35;
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
  }
  .card-feedback{
    flex:none;
    display:flex;
    align-items:center;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    font-weight:700;
    min-width:20px;
    justify-content:center;
  }
  .card-feedback.correct{ color:var(--success); }
  .card-feedback.wrong{ color:var(--error); }

  .arrows{
    flex:none;
    display:none;
    flex-direction:column;
    gap:2px;
    justify-content:center;
  }
  .arrows button{
    padding:2px 6px;
    font-size:10px;
    line-height:1;
  }
  @media (max-width:520px){
    .arrows{ display:flex; }
    .card-extract{ display:none; }
    .thumb{ width:60px; height:60px; }
  }

  .result-banner{
    margin-top:22px;
    padding:16px 18px;
    border-radius:6px;
    font-family:'JetBrains Mono', monospace;
    font-size:13px;
    text-align:center;
    display:none;
    letter-spacing:0.02em;
  }
  .result-banner.show{ display:block; }
  .result-banner.win{ background:var(--success-bg); color:var(--success); border:1px solid var(--success); }
  .result-banner.lose{ background:var(--error-bg); color:var(--error); border:1px solid var(--error); }

  .loading{
    text-align:center;
    color:var(--text-muted);
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    padding:60px 0;
    letter-spacing:0.05em;
  }
  .loading .spinner{
    display:inline-block;
    width:14px;height:14px;
    border-radius:50%;
    border:2px solid var(--brass-dim);
    border-top-color:var(--brass);
    animation:spin 0.8s linear infinite;
    margin-right:8px;
    vertical-align:-2px;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  footer{
    text-align:center;
    margin-top:40px;
    font-size:11px;
    color:var(--text-muted);
    font-family:'JetBrains Mono', monospace;
    letter-spacing:0.04em;
  }
  footer a{ color:var(--brass); text-decoration:none; }
</style>
</head>

const CARD_H = 96;   // must match .card height in CSS
const GAP = 14;       // must match #board gap in CSS

let order = [];        // current visual order, array of item objects (with data attached)
let solved = false;

const statusEl = document.getElementById('status');
const loadingEl = document.getElementById('loading');
const boardWrapEl = document.getElementById('boardWrap');
const boardEl = document.getElementById('board');
const railEl = document.getElementById('rail');
const validateBtn = document.getElementById('validateBtn');
const newGameBtn = document.getElementById('newGameBtn');
const resultBanner = document.getElementById('resultBanner');

function formatYear(y){
  const mono = n => n; // keep as number
  if (y < 0) return `${Math.abs(y)} av. J.-C.`;
  return `an ${y}`;
}

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickFive(){
  const shuffled = shuffle(POOL);
  const chosen = [];
  const usedYears = new Set();
  for (const item of shuffled){
    if (chosen.length >= 5) break;
    if (usedYears.has(item.year)) continue;
    usedYears.add(item.year);
    chosen.push(item);
  }
  return chosen;
}

const MONTHS = 'janvier|fÃĐvrier|mars|avril|mai|juin|juillet|aoÃŧt|septembre|octobre|novembre|dÃĐcembre';

// Strip anything that could give away the date/century: full dates, standalone
// 3-4 digit numbers (years), "av. J.-C." markers, and roman-numeral centuries.
function sanitizeExtract(text){
  if (!text) return '';
  let t = text;
  t = t.replace(new RegExp(`\\b\\d{1,2}(er)?\\s+(${MONTHS})\\s+\\d{1,4}\\b`, 'gi'), 'â');
  t = t.replace(new RegExp(`(${MONTHS})\\s+\\d{1,4}\\b`, 'gi'), '$1 â');
  t = t.replace(/\b\d{1,4}\b/g, 'â');
  t = t.replace(/â\s*av\.?\s*J\.?-?C\.?/gi, 'â');
  t = t.replace(/\b(I|II|III|IV|V|VI|VII|VIII|IX|X|XI|XII|XIII|XIV|XV|XVI|XVII|XVIII|XIX|XX|XXI)e?\s+si[eÃĻ]cle\b/gi, 'siÃĻcle â');
  t = t.replace(/(â\s*){2,}/g, 'â ');
  t = t.replace(/\s{2,}/g, ' ').trim();
  return t;
}

async function fetchSummary(item){
  try {
    const res = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(item.wiki)}`);
    if (!res.ok) throw new Error('bad response');
    const data = await res.json();
    const raw = (data.extract || '').split('. ').slice(0, 2).join('. ');
    return {
      extract: sanitizeExtract(raw),
      thumb: (data.thumbnail && data.thumbnail.source) ? data.thumbnail.source : null,
    };
  } catch (e) {
    return { extract: '', thumb: null };
  }
}

function buildRail(n){
  railEl.innerHTML = '<div class="rail-line"></div>';
  for (let i = 0; i < n; i++){
    const tick = document.createElement('div');
    tick.className = 'tick';
    tick.style.top = (i * (CARD_H + GAP) + CARD_H/2) + 'px';
    tick.dataset.index = i;
    const label = document.createElement('span');
    label.className = 'year-label';
    tick.appendChild(label);
    railEl.appendChild(tick);
  }
  railEl.style.height = (n * CARD_H + (n-1) * GAP) + 'px';
}

function revealYear(index, text){
  const tick = railEl.querySelector(`.tick[data-index="${index}"]`);
  if (!tick) return;
  tick.classList.add('revealed');
  tick.querySelector('.year-label').textContent = text;
}

function clearReveal(){
  railEl.querySelectorAll('.tick').forEach(t => {
    t.classList.remove('revealed');
    t.querySelector('.year-label').textContent = '';
  });
}

let cardEls = {}; // id -> DOM element, persistent across a game (no full re-render while dragging)

function slotY(index){ return index * (CARD_H + GAP); }

// Re-position every card (except the one currently being dragged, which
// follows the pointer directly) to match its index in `order`.
function layout(excludeId){
  order.forEach((item, i) => {
    if (item._id === excludeId) return;
    const el = cardEls[item._id];
    if (el) el.style.transform = `translateY(${slotY(i)}px)`;
  });
}

function render(){
  boardEl.innerHTML = '';
  cardEls = {};
  boardEl.style.height = (slotY(order.length - 1) + CARD_H) + 'px';

  order.forEach((item) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.id = item._id;
    card.style.transition = 'none'; // avoid slide-in animation on first paint

    const handle = document.createElement('div');
    handle.className = 'handle';
    handle.textContent = 'â ŋ';

    const thumb = document.createElement('div');
    thumb.className = 'thumb';
    if (item.thumb) {
      const img = document.createElement('img');
      img.src = item.thumb;
      img.alt = '';
      thumb.appendChild(img);
    } else {
      thumb.textContent = item.emoji;
    }

    const body = document.createElement('div');
    body.className = 'card-body';
    const titleEl = document.createElement('div');
    titleEl.className = 'card-title';
    titleEl.textContent = `${item.emoji} ${item.title}`;
    const extractEl = document.createElement('div');
    extractEl.className = 'card-extract';
    extractEl.textContent = item.extract || '';
    body.appendChild(titleEl);
    body.appendChild(extractEl);

    const feedback = document.createElement('div');
    feedback.className = 'card-feedback';
    feedback.dataset.role = 'feedback';

    const arrows = document.createElement('div');
    arrows.className = 'arrows';
    const upBtn = document.createElement('button');
    upBtn.textContent = 'âē';
    upBtn.addEventListener('click', () => moveCard(item._id, -1));
    const downBtn = document.createElement('button');
    downBtn.textContent = 'âž';
    downBtn.addEventListener('click', () => moveCard(item._id, 1));
    arrows.appendChild(upBtn);
    arrows.appendChild(downBtn);

    card.appendChild(handle);
    card.appendChild(thumb);
    card.appendChild(body);
    card.appendChild(feedback);
    card.appendChild(arrows);

    cardEls[item._id] = card;
    boardEl.appendChild(card);
    attachDrag(card, item);
  });

  layout(null);

  // Let the initial position apply instantly, then re-enable smooth
  // transitions for every future move.
  requestAnimationFrame(() => {
    Object.values(cardEls).forEach(el => { el.style.transition = ''; });
  });
}

function moveCard(id, delta){
  if (solved) return;
  const idx = order.findIndex(o => o._id === id);
  const newIdx = idx + delta;
  if (newIdx < 0 || newIdx >= order.length) return;
  const tmp = order[idx];
  order[idx] = order[newIdx];
  order[newIdx] = tmp;
  layout(null);
}

// ---- Pointer-based drag & drop reordering ----
// Cards are absolutely positioned by slot index (slotY). While dragging,
// the card's transform is driven directly by the pointer; every other card
// smoothly animates (CSS transition) to its new slot whenever the dragged
// card crosses a slot boundary. This avoids the jumpiness of DOM reordering.
function attachDrag(card, item){
  card.addEventListener('pointerdown', (e) => {
    if (solved) return;
    if (e.target.closest('.arrows')) return; // let arrow buttons work independently

    const startClientY = e.clientY;
    const startIndex = order.findIndex(o => o._id === item._id);
    const startTranslate = slotY(startIndex);
    const maxTranslate = slotY(order.length - 1);

    card.setPointerCapture(e.pointerId);
    card.classList.add('dragging');

    function onMove(ev){
      const dy = ev.clientY - startClientY;
      const t = Math.max(0, Math.min(maxTranslate, startTranslate + dy));
      card.style.transform = `translateY(${t}px)`;

      const candidateIndex = Math.round(t / (CARD_H + GAP));
      const currentIndex = order.findIndex(o => o._id === item._id);
      if (candidateIndex !== currentIndex){
        const [moved] = order.splice(currentIndex, 1);
        order.splice(candidateIndex, 0, moved);
        layout(item._id);
      }
    }

    function onUp(){
      card.classList.remove('dragging');
      const finalIndex = order.findIndex(o => o._id === item._id);
      card.style.transform = `translateY(${slotY(finalIndex)}px)`;
      card.removeEventListener('pointermove', onMove);
      card.removeEventListener('pointerup', onUp);
      card.removeEventListener('pointercancel', onUp);
    }

    card.addEventListener('pointermove', onMove);
    card.addEventListener('pointerup', onUp);
    card.addEventListener('pointercancel', onUp);
  });
}

function checkOrder(){
  if (solved) return;
  solved = true;
  validateBtn.disabled = true;

  const correctOrder = order.slice().sort((a, b) => a.year - b.year);
  let allCorrect = true;

  order.forEach((item, idx) => {
    const card = cardEls[item._id];
    const feedback = card.querySelector('[data-role="feedback"]');
    const isCorrect = correctOrder[idx]._id === item._id;
    if (isCorrect){
      card.classList.add('correct');
      feedback.classList.add('correct');
      feedback.textContent = 'â';
    } else {
      card.classList.add('wrong');
      feedback.classList.add('wrong');
      feedback.textContent = 'â';
      allCorrect = false;
    }
    revealYear(idx, formatYear(item.year));
  });

  resultBanner.className = 'result-banner show ' + (allCorrect ? 'win' : 'lose');
  resultBanner.textContent = allCorrect
    ? 'â Chronologie parfaite ! Bravo.'
    : 'â Pas tout Ã  fait â regarde les dates rÃĐvÃĐlÃĐes sur la rÃĻgle Ã  gauche.';

  statusEl.textContent = allCorrect ? 'Partie gagnÃĐe' : 'Partie terminÃĐe';
}

async function newGame(){
  solved = false;
  resultBanner.className = 'result-banner';
  clearReveal();
  loadingEl.style.display = 'block';
  boardWrapEl.style.display = 'none';
  validateBtn.disabled = true;
  newGameBtn.disabled = true;
  statusEl.textContent = 'ChargementâĶ';

  const items = pickFive();
  const enriched = await Promise.all(items.map(async (item, i) => {
    const summary = await fetchSummary(item);
    return Object.assign({}, item, summary, { _id: i + '-' + Date.now() });
  }));

  order = shuffle(enriched);
  buildRail(order.length);
  render();

  loadingEl.style.display = 'none';
  boardWrapEl.style.display = 'flex';
  validateBtn.disabled = false;
  newGameBtn.disabled = false;
  statusEl.textContent = `${order.length} ÃĐvÃĐnements Â· glisse pour rÃĐordonner`;
}

validateBtn.addEventListener('click', checkOrder);
newGameBtn.addEventListener('click', newGame);

newGame();

})();
</script>
