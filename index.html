<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wiki Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <button id="themeToggle" class="theme-toggle" aria-label="Basculer entre mode clair et sombre" title="Mode clair / sombre">🌙</button>
  <div class="eyebrow">Chronomètre encyclopédique</div>
  <h1>Wiki <em>Timeline</em></h1>
  <p class="subtitle">
    Remets ces cinq faits tirés de <strong>Wikipédia</strong> du <strong>plus ancien</strong> (en haut) au <strong>plus récent</strong> (en bas).
  </p>

  <div class="toolbar">
    <span class="status" id="status">Chargement…</span>
    <div style="display:flex; gap:8px;">
      <button id="validateBtn" disabled>Valider l'ordre</button>
      <button id="newGameBtn" class="btn-primary">Nouvelle partie</button>
    </div>
  </div>

  <div id="loading" class="loading"><span class="spinner"></span>Interrogation de Wikipédia…</div>

  <div class="board-wrap" id="boardWrap" style="display:none;">
    <div class="rail" id="rail"></div>
    <div id="board"></div>
  </div>

  <div class="result-banner" id="resultBanner"></div>

  <footer>Données via l'API REST de <a href="https://fr.wikipedia.org" target="_blank" rel="noopener">Wikipédia</a></footer>
</div>

<script src="script.js"></script>
</body>
</html>
